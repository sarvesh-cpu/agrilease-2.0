services:
  - type: web
    name: agrilease-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    disk:
      name: sqlite-data
      mountPath: /opt/render/project/src/backend
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 20.x
      - key: PORT
        value: 5000
